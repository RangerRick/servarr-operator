apiVersion: servarr.dev/v1alpha1
kind: MediaStack
metadata:
  name: media
  namespace: servarr-system
spec:
  # Use in-cluster NFS with docker-desktop default storage class.
  # 10Gi is plenty for local dev — the NFS server just needs enough room
  # for config files and small test downloads.
  nfs:
    storageSize: 10Gi
    # no storageClass → uses cluster default (hostpath on docker-desktop)

  defaults:
    uid: 1000
    gid: 1000

    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: "1"
        memory: 512Mi

    env:
      - name: TZ
        value: America/Chicago

  apps:

    # ── Media servers ──────────────────────────────────────────────────────
    # PLEX_CLAIM is optional. Without it the server starts unclaimed and is
    # accessible via port-forward at http://localhost:32400/web. To link it
    # to your plex.tv account, get a one-time token from plex.tv/claim and
    # set it here before first run:
    #   env:
    #     - name: PLEX_CLAIM
    #       value: "claim-xxxxxxxxxxxxxxxxxxxx"
    - app: Plex
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: "2"
          memory: 2Gi
      gateway:
        enabled: true
        parentRefs:
          - name: servarr-gateway
            namespace: servarr-system
            sectionName: http
        hosts:
          - plex.127.0.0.1.nip.io

    - app: Jellyfin
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: "2"
          memory: 2Gi
      # No GPU on docker-desktop/macOS
      gateway:
        enabled: true
        parentRefs:
          - name: servarr-gateway
            namespace: servarr-system
            sectionName: http
        hosts:
          - jellyfin.127.0.0.1.nip.io

    # ── Download clients ───────────────────────────────────────────────────
    - app: Sabnzbd
      gateway:
        enabled: true
        parentRefs:
          - name: servarr-gateway
            namespace: servarr-system
            sectionName: http
        hosts:
          - sabnzbd.127.0.0.1.nip.io
      appConfig:
        sabnzbd:
          hostWhitelist:
            - sabnzbd.servarr-system.svc.cluster.local
            - sabnzbd.127.0.0.1.nip.io
          tarUnpack: true

    - app: Transmission
      gateway:
        enabled: true
        parentRefs:
          - name: servarr-gateway
            namespace: servarr-system
            sectionName: http
        hosts:
          - transmission.127.0.0.1.nip.io
      appConfig:
        transmission:
          auth:
            secretName: transmission-auth
          peerPort:
            port: 51413
            hostPort: false   # hostPort not reliable on docker-desktop
          settings:
            ratio-limit-enabled: true
            ratio-limit: 2.0

    # ── Media managers ─────────────────────────────────────────────────────
    - app: Sonarr
      split4k: true
      apiKeySecret: sonarr-api-key
      backup:
        enabled: true
        schedule: "0 3 * * *"
        retentionCount: 7
      prowlarrSync:
        enabled: true
      gateway:
        enabled: true
        parentRefs:
          - name: servarr-gateway
            namespace: servarr-system
            sectionName: http
        hosts:
          - sonarr.127.0.0.1.nip.io
      split4kOverrides:
        gateway:
          enabled: true
          parentRefs:
            - name: servarr-gateway
              namespace: servarr-system
              sectionName: http
          hosts:
            - sonarr-4k.127.0.0.1.nip.io

    - app: Radarr
      split4k: true
      apiKeySecret: radarr-api-key
      backup:
        enabled: true
        schedule: "0 3 * * *"
        retentionCount: 7
      prowlarrSync:
        enabled: true
      gateway:
        enabled: true
        parentRefs:
          - name: servarr-gateway
            namespace: servarr-system
            sectionName: http
        hosts:
          - radarr.127.0.0.1.nip.io
      split4kOverrides:
        gateway:
          enabled: true
          parentRefs:
            - name: servarr-gateway
              namespace: servarr-system
              sectionName: http
          hosts:
            - radarr-4k.127.0.0.1.nip.io

    - app: Lidarr
      apiKeySecret: lidarr-api-key
      backup:
        enabled: true
        schedule: "0 3 * * *"
        retentionCount: 7
      prowlarrSync:
        enabled: true
      gateway:
        enabled: true
        parentRefs:
          - name: servarr-gateway
            namespace: servarr-system
            sectionName: http
        hosts:
          - lidarr.127.0.0.1.nip.io

    # ── Indexers ───────────────────────────────────────────────────────────
    - app: Prowlarr
      apiKeySecret: prowlarr-api-key
      backup:
        enabled: true
        schedule: "0 2 * * *"
        retentionCount: 7
      gateway:
        enabled: true
        parentRefs:
          - name: servarr-gateway
            namespace: servarr-system
            sectionName: http
        hosts:
          - prowlarr.127.0.0.1.nip.io

    # ── Request management ─────────────────────────────────────────────────
    - app: Overseerr
      apiKeySecret: overseerr-api-key
      overseerrSync:
        enabled: true
      gateway:
        enabled: true
        parentRefs:
          - name: servarr-gateway
            namespace: servarr-system
            sectionName: http
        hosts:
          - overseerr.127.0.0.1.nip.io
      appConfig:
        overseerr:
          sonarr:
            profileId: 1
            profileName: "HD-1080p"
            rootFolder: /tv
            enableSeasonFolders: true
            fourK:
              profileId: 2
              profileName: "2160p-HDR"
              rootFolder: /tv
              enableSeasonFolders: true
          radarr:
            profileId: 1
            profileName: "HD-1080p"
            rootFolder: /movies
            minimumAvailability: released
            fourK:
              profileId: 2
              profileName: "2160p-HDR"
              rootFolder: /movies
              minimumAvailability: released

    # ── Monitoring / utilities ─────────────────────────────────────────────
    - app: Tautulli
      gateway:
        enabled: true
        parentRefs:
          - name: servarr-gateway
            namespace: servarr-system
            sectionName: http
        hosts:
          - tautulli.127.0.0.1.nip.io

    - app: Maintainerr
      gateway:
        enabled: true
        parentRefs:
          - name: servarr-gateway
            namespace: servarr-system
            sectionName: http
        hosts:
          - maintainerr.127.0.0.1.nip.io
