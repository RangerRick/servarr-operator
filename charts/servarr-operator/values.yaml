image:
  repository: ghcr.io/rangerrick/servarr-operator
  tag: ""  # defaults to appVersion
  pullPolicy: IfNotPresent

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 64Mi

webhook:
  enabled: true

# By default the operator watches only its own namespace (Role/RoleBinding).
# Set to true to watch all namespaces (ClusterRole/ClusterRoleBinding).
watchAllNamespaces: false

nodeSelector: {}
tolerations: []

# Node Feature Discovery (NFD) subchart.
# Set nfd.enabled=true to install NFD alongside the operator in a single helm install.
# NFD labels each node with detected hardware features (CPUs, GPUs, PCIe devices, kernel
# modules), enabling GPU-aware scheduling for apps like Jellyfin and Plex.
#
# Standalone install (without this chart):
#   helm install nfd oci://registry.k8s.io/nfd/charts/node-feature-discovery \
#     --namespace node-feature-discovery --create-namespace --version 0.18.3
#
# All node-feature-discovery chart values can be passed under the nfd key, e.g.:
#   nfd:
#     enabled: true
#     worker:
#       config:
#         sources:
#           pci:
#             deviceClassWhitelist: ["0300", "0302"]
nfd:
  enabled: false

# Default container images for managed apps.
# AUTO-GENERATED from image-defaults.toml — edit that file instead.
# Regenerate with: scripts/sync-image-defaults.sh
defaultImages:
  sonarr:
    repository: linuxserver/sonarr
    tag: "4.0.16"
  radarr:
    repository: linuxserver/radarr
    tag: "6.0.4"
  lidarr:
    repository: linuxserver/lidarr
    tag: "2.9.6"
  prowlarr:
    repository: linuxserver/prowlarr
    tag: "2.3.0"
  sabnzbd:
    repository: linuxserver/sabnzbd
    tag: "4.5.5"
  transmission:
    repository: linuxserver/transmission
    tag: "4.1.0"
  tautulli:
    repository: linuxserver/tautulli
    tag: "2.16.0"
  overseerr:
    repository: linuxserver/overseerr
    tag: "1.34.0"
  maintainerr:
    repository: ghcr.io/jorenn92/maintainerr
    tag: "2.19.0"
  jackett:
    repository: linuxserver/jackett
    tag: "0.24.988"
  jellyfin:
    repository: linuxserver/jellyfin
    tag: "10.10.7"
