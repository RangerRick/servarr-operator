name: Cleanup Snapshots

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  packages: write

env:
  # Number of days to retain snapshot builds before deletion.
  # Change this value to adjust the retention window.
  RETENTION_DAYS: 7

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Compute cutoff date
        id: cutoff
        run: |
          cutoff=$(date -u -d "${RETENTION_DAYS} days ago" +%Y%m%d)
          echo "date=${cutoff}" >> "$GITHUB_OUTPUT"
          echo "Deleting snapshot versions older than ${cutoff} (${RETENTION_DAYS} days)"

      - name: Delete old snapshot container image tags
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CUTOFF: ${{ steps.cutoff.outputs.date }}
        run: |
          cutoff="${CUTOFF}"
          package="servarr-operator"

          # Skip if the package doesn't exist yet
          if ! gh api "/user/packages/container/${package}" &>/dev/null; then
            echo "Package ${package} not found, skipping"
            exit 0
          fi

          gh api --paginate "/user/packages/container/${package}/versions" 2>/dev/null \
          | jq -c '.[]? | select(.metadata.container.tags[]? | test("^snapshot-[0-9]{8}$")) | {id: .id, tags: .metadata.container.tags}' \
          | while read -r entry; do
            version_id=$(echo "$entry" | jq -r '.id')
            tags=$(echo "$entry" | jq -r '.tags[]')

            # Check if any snapshot-YYYYMMDD tag is older than cutoff
            for tag in $tags; do
              if [[ "$tag" =~ ^snapshot-([0-9]{8})$ ]]; then
                tag_date="${BASH_REMATCH[1]}"
                if [[ "$tag_date" < "$cutoff" ]]; then
                  echo "Deleting ${package} version ${version_id} (tag: ${tag})"
                  gh api --method DELETE \
                    "/user/packages/container/${package}/versions/${version_id}" \
                    || echo "  Warning: failed to delete version ${version_id}"
                  break
                fi
              fi
            done
          done

      - name: Delete old snapshot Helm chart versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CUTOFF: ${{ steps.cutoff.outputs.date }}
        run: |
          cutoff="${CUTOFF}"

          for chart in servarr-crds servarr-operator; do
            # Helm OCI charts are stored under the "servarr" package namespace
            package="servarr%2F${chart}"

            # Skip if the package doesn't exist yet
            if ! gh api "/user/packages/container/${package}" &>/dev/null; then
              echo "Package ${chart} not found, skipping"
              continue
            fi

            gh api --paginate "/user/packages/container/${package}/versions" 2>/dev/null \
            | jq -c '.[]? | {id: .id, tags: .metadata.container.tags}' \
            | while read -r entry; do
              version_id=$(echo "$entry" | jq -r '.id')
              tags=$(echo "$entry" | jq -r '.tags[]')

              for tag in $tags; do
                if [[ "$tag" =~ ^0\.0\.0-snapshot\.([0-9]{8})$ ]]; then
                  tag_date="${BASH_REMATCH[1]}"
                  if [[ "$tag_date" < "$cutoff" ]]; then
                    echo "Deleting ${chart} version ${version_id} (tag: ${tag})"
                    gh api --method DELETE \
                      "/user/packages/container/${package}/versions/${version_id}" \
                      || echo "  Warning: failed to delete version ${version_id}"
                    break
                  fi
                fi
              done
            done
          done
