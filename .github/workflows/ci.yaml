name: CI

on:
  push:
    branches: ['**']
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "LICENSE"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# publish (snapshot) requires contents: write and packages: write.
# Those permissions are declared at the job level on the publish job.
# All other jobs explicitly limit themselves to contents: read.
permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  IMAGE_NAME: ghcr.io/rangerrick/servarr-operator
  HELM_REGISTRY: oci://ghcr.io/rangerrick/servarr

jobs:
  # ── Stage 0: Detect flags and changed paths ────────────────────────────
  detect-flags:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      full_build: ${{ steps.parse.outputs.full_build }}
      run_smoke: ${{ steps.parse.outputs.run_smoke }}
      smoke_files_changed: ${{ steps.parse.outputs.smoke_files_changed }}
      crd_files_changed: ${{ steps.parse.outputs.crd_files_changed }}
      run_snapshot: ${{ steps.parse.outputs.run_snapshot }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Detect CI flags and changed paths
        id: parse
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          BASE_REF: ${{ github.base_ref }}
          BEFORE: ${{ github.event.before }}
          EVENT: ${{ github.event_name }}
          REF: ${{ github.ref }}
        run: |
          if [[ "$EVENT" == "pull_request" ]]; then
            msg="$PR_TITLE"
          else
            msg="$COMMIT_MSG"
          fi
          full_build=false
          run_smoke=false
          smoke_files_changed=false
          crd_files_changed=false
          run_snapshot=false
          [[ "$msg" == *"[full-build]"* ]] && full_build=true
          [[ "$msg" == *"[smoke]"* ]] && run_smoke=true
          [[ "$msg" == *"[snapshot]"* ]] && run_snapshot=true
          [[ "$EVENT" == "workflow_dispatch" || "$REF" == "refs/heads/main" ]] && run_snapshot=true
          # Detect modifications to smoke-test files or CRD sources.
          # PRs: diff against the base branch.  Pushes: diff against the
          # previous SHA (skipped for initial branch pushes with no prior commit).
          if [[ "$EVENT" == "pull_request" ]]; then
            changed=$(git diff --name-only "origin/${BASE_REF}...HEAD")
          elif [[ "$BEFORE" != "0000000000000000000000000000000000000000" ]] \
            && git cat-file -e "$BEFORE" 2>/dev/null; then
            changed=$(git diff --name-only "$BEFORE" HEAD)
          else
            changed=""
          fi
          echo "$changed" | grep -q "^\.github/smoke-test/" && smoke_files_changed=true || true
          echo "$changed" | grep -qE "^(charts/servarr-crds/|crates/servarr-resources/)" \
            && crd_files_changed=true || true
          # Snapshot publish requires smoke tests to pass first.
          [[ "$run_snapshot" == "true" ]] && run_smoke=true
          {
            echo "full_build=$full_build"
            echo "run_smoke=$run_smoke"
            echo "smoke_files_changed=$smoke_files_changed"
            echo "crd_files_changed=$crd_files_changed"
            echo "run_snapshot=$run_snapshot"
          } >> "$GITHUB_OUTPUT"

  # ── Stage 1: Fast lint ─────────────────────────────────────────────────
  fmt:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check formatting
        run: cargo fmt --all --check

  actionlint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run actionlint
        uses: reviewdog/action-actionlint@0d952c597ef8459f634d7145b0b044a9699e5e43 # v1.71.0

  zizmor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@0dce2577a4760a2749d8cfb7a84b7d5585ebcb7d # v0.5.0
        with:
          advanced-security: false

  helm-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1

      - name: Lint charts
        run: |
          helm lint charts/servarr-crds/ --set operatorNamespace=servarr
          helm lint charts/servarr-operator/
          helm dependency build charts/servarr-operator/
          helm template test charts/servarr-crds/ --set operatorNamespace=servarr > /dev/null
          helm template test charts/servarr-crds/ --set webhook.enabled=false > /dev/null
          helm template test charts/servarr-operator/ > /dev/null
          helm template test charts/servarr-operator/ --set watchAllNamespaces=true > /dev/null

  # ── Stage 2: Analysis + Build ──────────────────────────────────────────
  clippy:
    needs: [fmt, actionlint, zizmor]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Rust cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    needs: [fmt, actionlint, zizmor]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Rust cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@1cf3de8de323df92fe08c793e53eaef58799aec4 # v2.68.3
        with:
          tool: cargo-llvm-cov

      - name: Run tests with coverage
        run: |
          threshold=$(cat .coverage-threshold)
          cargo llvm-cov --workspace --fail-under-lines "$threshold" --summary-only 2>&1 | tee /tmp/coverage-summary.txt

      - name: Post coverage summary
        if: always()
        run: |
          {
            echo "### Code Coverage"
            echo ""
            echo '```'
            tail -5 /tmp/coverage-summary.txt
            echo '```'
            echo ""
            echo "Threshold: $(cat .coverage-threshold)% lines"
          } >> "$GITHUB_STEP_SUMMARY"

  crd-drift:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download operator binary
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: operator-binary-linux-amd64
          path: /tmp/bin

      - name: Regenerate CRDs from pre-built binary
        run: |
          chmod +x /tmp/bin/servarr-operator
          /tmp/bin/servarr-operator crd > /tmp/all-crds.yaml
          export TMPDIR_SPLIT
          TMPDIR_SPLIT=$(mktemp -d)
          awk '
          /^apiVersion:/ { n++ }
          n == 1 { print > (ENVIRON["TMPDIR_SPLIT"] "/crd-1.yaml") }
          n == 2 { print > (ENVIRON["TMPDIR_SPLIT"] "/crd-2.yaml") }
          ' /tmp/all-crds.yaml
          for f in "$TMPDIR_SPLIT"/crd-*.yaml; do
            [ -s "$f" ] || continue
            name=$(grep -m1 '^  name:' "$f" | awk '{print $2}')
            case "$name" in
              servarrapps.servarr.dev) cp -f "$f" charts/servarr-crds/templates/servarrapp-crd.yaml ;;
              mediastacks.servarr.dev) cp -f "$f" charts/servarr-crds/templates/mediastack-crd.yaml ;;
            esac
          done

      - name: Check for CRD drift
        run: |
          if ! git diff --exit-code charts/servarr-crds/templates/; then
            echo "::error::CRD files are out of date. Run 'scripts/generate-crds.sh' and commit the result."
            exit 1
          fi

  # amd64 Linux: always runs — feeds crd-drift, smoke-test, and publish.
  build:
    needs: [fmt, actionlint, zizmor]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Rust cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          cache-on-failure: true
          key: musl-amd64

      - name: Install musl toolchain
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq musl-tools
          rustup target add x86_64-unknown-linux-musl

      - name: Build static release binary
        run: cargo build --release --target x86_64-unknown-linux-musl --bin servarr-operator

      - name: Upload binary artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: operator-binary-linux-amd64
          path: target/x86_64-unknown-linux-musl/release/servarr-operator
          retention-days: 1

      - name: Package Docker image for smoke test
        run: |
          cp target/x86_64-unknown-linux-musl/release/servarr-operator /tmp/servarr-operator
          docker build -t servarr-operator:ci -f- /tmp <<'DOCKERFILE'
          FROM gcr.io/distroless/static-debian12:nonroot
          COPY servarr-operator /servarr-operator
          USER nonroot:nonroot
          ENTRYPOINT ["/servarr-operator"]
          DOCKERFILE

      - name: Save Docker image as artifact
        run: docker save servarr-operator:ci | gzip > /tmp/servarr-operator-ci.tar.gz

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: operator-image
          path: /tmp/servarr-operator-ci.tar.gz
          retention-days: 1

  # arm64 Linux: runs when a snapshot publish is needed or [full-build] is set.
  # Produces the arm64 binary used by the publish job's multi-arch container build.
  build-arm64:
    needs: [fmt, actionlint, zizmor, detect-flags]
    if: >-
      needs.detect-flags.outputs.run_snapshot == 'true' ||
      needs.detect-flags.outputs.full_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Rust cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          cache-on-failure: true
          key: musl-arm64

      - name: Install musl toolchain
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq musl-tools
          rustup target add aarch64-unknown-linux-musl

      - name: Install cross
        uses: taiki-e/install-action@1cf3de8de323df92fe08c793e53eaef58799aec4 # v2.68.3
        with:
          tool: cross

      - name: Build static release binary
        run: |
          # gcc-aarch64-linux-gnu targets glibc; on Ubuntu 24.04 it emits
          # __isoc23_sscanf and __*_chk symbols that musl does not provide.
          # cross uses a Docker image with a proper musl cross-toolchain.
          cross build --release --target aarch64-unknown-linux-musl --bin servarr-operator

      - name: Upload binary artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: operator-binary-linux-arm64
          path: target/aarch64-unknown-linux-musl/release/servarr-operator
          retention-days: 1

  # macOS: runs when a snapshot publish is needed or [full-build] is set.
  # Produces amd64 and arm64 Darwin binaries for the publish job.
  build-macos:
    needs: [fmt, actionlint, zizmor, detect-flags]
    if: >-
      needs.detect-flags.outputs.run_snapshot == 'true' ||
      needs.detect-flags.outputs.full_build == 'true'
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Rust cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          cache-on-failure: true
          key: macos

      - name: Install macOS targets
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Build release binaries
        run: |
          cargo build --release --target x86_64-apple-darwin --bin servarr-operator
          cargo build --release --target aarch64-apple-darwin --bin servarr-operator

      - name: Upload macOS amd64 binary
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: operator-binary-darwin-amd64
          path: target/x86_64-apple-darwin/release/servarr-operator
          retention-days: 1

      - name: Upload macOS arm64 binary
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: operator-binary-darwin-arm64
          path: target/aarch64-apple-darwin/release/servarr-operator
          retention-days: 1

  # ── Stage 3: Integration smoke test ───────────────────────────────────
  # Runs automatically on main and workflow_dispatch.
  # On branches: also runs when .github/smoke-test/** or CRD sources change,
  # or when [smoke] appears in the commit message / PR title.
  smoke-test:
    needs: [build, clippy, test, helm-lint, crd-drift, detect-flags]
    if: >-
      github.ref == 'refs/heads/main' ||
      github.event_name == 'workflow_dispatch' ||
      needs.detect-flags.outputs.run_smoke == 'true' ||
      needs.detect-flags.outputs.smoke_files_changed == 'true' ||
      needs.detect-flags.outputs.crd_files_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download operator image artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: operator-image
          path: /tmp

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          cluster_name: kind
          wait: 120s

      # The operator image is built in CI and not published anywhere yet, so
      # we load it directly into kind's containerd. App images are all public
      # and will be pulled from their upstream registries as pods start.
      - name: Load operator image into kind
        run: |
          gunzip -c /tmp/servarr-operator-ci.tar.gz \
            | docker exec -i kind-control-plane \
                ctr --namespace=k8s.io images import --digests --snapshotter=overlayfs -

      - name: Install CRDs
        run: |
          helm template smoke-crds charts/servarr-crds/ \
            --set webhook.enabled=false \
            | kubectl apply -f -

      - name: Install operator via Helm
        run: |
          helm dependency build charts/servarr-operator/
          helm template smoke charts/servarr-operator/ \
            --set image.repository=servarr-operator \
            --set image.tag=ci \
            --set image.pullPolicy=Never \
            --set webhook.enabled=false \
            --set watchAllNamespaces=true \
            | kubectl apply -f -

      - name: Wait for operator rollout
        run: kubectl rollout status deployment/servarr-operator --timeout=120s

      - name: Apply ServarrApp CRs
        run: kubectl apply -f .github/smoke-test/manifests/

      - name: Run smoke tests
        run: bash .github/smoke-test/smoke-test.sh

      - name: Dump debug info on failure
        if: failure()
        run: |
          echo "=== Node resources ==="
          kubectl top nodes 2>/dev/null || kubectl describe nodes | grep -A 10 'Allocated resources' || true
          echo ""
          echo "=== Node conditions ==="
          kubectl get nodes -o wide || true
          kubectl describe nodes | grep -E '(Conditions:|MemoryPressure|DiskPressure|PIDPressure|Ready)' || true
          echo ""
          echo "=== Operator logs ==="
          kubectl logs deployment/servarr-operator --tail=100 || true
          echo ""
          echo "=== Pod status ==="
          kubectl get pods -A -o wide || true
          echo ""
          echo "=== Unhealthy pod logs (non-running, restarted, or not-ready) ==="
          kubectl get pods --no-headers -o custom-columns=':metadata.name,:status.phase,:status.containerStatuses[*].restartCount,:status.containerStatuses[*].ready' | \
            awk '$2 != "Running" || ($3+0) > 0 || $4 != "true" {print $1}' | while read -r pod; do
            echo "--- $pod (previous) ---"
            kubectl logs "$pod" --all-containers --previous --tail=50 2>/dev/null || true
            echo "--- $pod (current) ---"
            kubectl logs "$pod" --all-containers --tail=80 2>/dev/null || true
            echo ""
          done
          echo "=== Events ==="
          kubectl get events --sort-by='.lastTimestamp' || true
          echo ""
          echo "=== ServarrApp status ==="
          kubectl get servarrapps -o yaml || true
          echo ""
          echo "=== Transmission diagnostics ==="
          echo "--- media-transmission process env ---"
          kubectl exec deployment/media-transmission -- env 2>/dev/null \
            | grep -E "^(USER|FILE__USER)=" || echo "(exec failed or no USER)"
          kubectl exec deployment/media-transmission -- env 2>/dev/null \
            | grep -qE "^(PASS|FILE__PASS)=" && echo "PASS is set" || echo "PASS is NOT set"
          echo "--- media-transmission s6 container env ---"
          kubectl exec deployment/media-transmission -- cat /run/s6/container_environment/USER 2>/dev/null \
            && echo "" || echo "(USER not in s6 env)"
          kubectl exec deployment/media-transmission -- \
            sh -c 'test -f /run/s6/container_environment/PASS && echo "PASS is set" || echo "PASS not in s6 env"' \
            2>/dev/null || echo "(exec failed)"
          echo "--- media-transmission settings.json auth fields ---"
          kubectl exec deployment/media-transmission -- cat /config/settings.json 2>/dev/null \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('rpc-authentication-required:', d.get('rpc-authentication-required')); print('rpc-username:', d.get('rpc-username'))" \
            2>/dev/null || echo "(exec or parse failed)"
          echo "--- media-transmission RPC response (bare request, no creds) ---"
          kubectl port-forward deployment/media-transmission 39091:9091 &>/dev/null &
          sleep 3
          curl -si --max-time 5 -X POST http://localhost:39091/transmission/rpc \
            -H 'Content-Type: application/json' -d '{"method":"session-get"}' 2>/dev/null \
            | head -5 || echo "(curl failed)"
          kill %% 2>/dev/null || true

  # ── Stage 4: Snapshot publish ──────────────────────────────────────────
  # Publishes a multi-arch container image and Helm charts to GHCR.
  # Only runs on main or workflow_dispatch (or when [snapshot] appears in the
  # commit message).  Always waits for smoke tests to pass first.
  version:
    needs: [detect-flags]
    if: needs.detect-flags.outputs.run_snapshot == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      date: ${{ steps.v.outputs.date }}
      chart_version: ${{ steps.v.outputs.chart_version }}
    steps:
      - name: Compute snapshot version
        id: v
        run: |
          date_stamp=$(date -u +%Y%m%d)
          {
            echo "date=${date_stamp}"
            echo "chart_version=0.0.0-snapshot.${date_stamp}"
          } >> "$GITHUB_OUTPUT"

  publish:
    needs: [detect-flags, version, build, build-arm64, build-macos, smoke-test]
    if: needs.detect-flags.outputs.run_snapshot == 'true'
    permissions:
      contents: write
      packages: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download amd64 binary
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: operator-binary-linux-amd64
          path: /tmp/bin-amd64

      - name: Download arm64 binary
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: operator-binary-linux-arm64
          path: /tmp/bin-arm64

      - name: Download macOS amd64 binary
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: operator-binary-darwin-amd64
          path: /tmp/bin-darwin-amd64

      - name: Download macOS arm64 binary
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: operator-binary-darwin-arm64
          path: /tmp/bin-darwin-arm64

      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare build context
        run: |
          mkdir -p /tmp/docker-context
          chmod +x /tmp/bin-amd64/servarr-operator /tmp/bin-arm64/servarr-operator
          cp -f /tmp/bin-amd64/servarr-operator /tmp/docker-context/servarr-operator-amd64
          cp -f /tmp/bin-arm64/servarr-operator /tmp/docker-context/servarr-operator-arm64

          cat > /tmp/docker-context/Dockerfile <<'DOCKERFILE'
          FROM gcr.io/distroless/static-debian12:nonroot
          ARG TARGETARCH
          COPY servarr-operator-${TARGETARCH} /servarr-operator
          USER nonroot:nonroot
          ENTRYPOINT ["/servarr-operator"]
          DOCKERFILE

      - name: Build and push multi-arch container image
        env:
          DATE: ${{ needs.version.outputs.date }}
        run: |
          # shellcheck disable=SC2086  # tag flags are intentionally word-split
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --tag "${IMAGE_NAME}:snapshot" \
            --tag "${IMAGE_NAME}:snapshot-${DATE}" \
            --label "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.version=snapshot-${DATE}" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --label "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --push \
            /tmp/docker-context

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1

      - name: Package and push Helm charts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHART_VERSION: ${{ needs.version.outputs.chart_version }}
        run: |
          echo "$GITHUB_TOKEN" | helm registry login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

          for chart in servarr-crds servarr-operator; do
            helm dependency build "charts/${chart}/"
            helm package "charts/${chart}/" \
              --version "${CHART_VERSION}" \
              --app-version "snapshot-$(date -u +%Y%m%d)" \
              -d /tmp/charts
            helm push "/tmp/charts/${chart}-${CHART_VERSION}.tgz" "${HELM_REGISTRY}"
          done

      - name: Publish binaries as GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DATE: ${{ needs.version.outputs.date }}
        run: |
          chmod +x \
            /tmp/bin-amd64/servarr-operator \
            /tmp/bin-arm64/servarr-operator \
            /tmp/bin-darwin-amd64/servarr-operator \
            /tmp/bin-darwin-arm64/servarr-operator

          tag="snapshot-${DATE}"
          # Replace any existing release for this date tag.
          gh release delete "${tag}" --yes --cleanup-tag 2>/dev/null || true
          gh release create "${tag}" \
            --prerelease \
            --title "Snapshot ${DATE}" \
            --generate-notes \
            --target "${GITHUB_SHA}" \
            "/tmp/bin-amd64/servarr-operator#servarr-operator-linux-x86_64" \
            "/tmp/bin-arm64/servarr-operator#servarr-operator-linux-aarch64" \
            "/tmp/bin-darwin-amd64/servarr-operator#servarr-operator-darwin-x86_64" \
            "/tmp/bin-darwin-arm64/servarr-operator#servarr-operator-darwin-aarch64"
