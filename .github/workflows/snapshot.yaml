name: Snapshot

on:
  push:
    branches: ['**']
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "LICENSE"
  workflow_dispatch:

concurrency:
  group: snapshot-${{ github.ref }}
  cancel-in-progress: true

permissions:
  # contents: write is required because the publish job calls _publish.yaml,
  # which declares permissions: contents: write. GitHub requires the calling
  # workflow's top-level permissions to allow what the reusable workflow declares.
  # The version and ci jobs only use contents: read in practice.
  contents: write # zizmor: ignore[excessive-permissions]

jobs:
  # Determine whether this run should produce a snapshot.
  # On main and workflow_dispatch: always run.
  # On other branches: only run when [snapshot] appears in the commit message.
  detect-flags:
    runs-on: ubuntu-latest
    outputs:
      run_snapshot: ${{ steps.parse.outputs.run_snapshot }}
    steps:
      - name: Parse commit message flags
        id: parse
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          EVENT: ${{ github.event_name }}
          REF: ${{ github.ref }}
        run: |
          if [[ "$EVENT" == "workflow_dispatch" || "$REF" == "refs/heads/main" ]]; then
            echo "run_snapshot=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          run_snapshot=false
          [[ "$COMMIT_MSG" == *"[snapshot]"* ]] && run_snapshot=true
          echo "run_snapshot=$run_snapshot" >> "$GITHUB_OUTPUT"

  version:
    needs: [detect-flags]
    if: needs.detect-flags.outputs.run_snapshot == 'true'
    runs-on: ubuntu-latest
    outputs:
      date: ${{ steps.v.outputs.date }}
      chart-version: ${{ steps.v.outputs.chart_version }}
    steps:
      - name: Compute snapshot version
        id: v
        run: |
          date_stamp=$(date -u +%Y%m%d)
          echo "date=${date_stamp}" >> "$GITHUB_OUTPUT"
          echo "chart_version=0.0.0-snapshot.${date_stamp}" >> "$GITHUB_OUTPUT"

  ci:
    needs: [detect-flags]
    if: needs.detect-flags.outputs.run_snapshot == 'true'
    uses: ./.github/workflows/_ci.yaml

  publish:
    needs: [detect-flags, version, ci]
    if: needs.detect-flags.outputs.run_snapshot == 'true'
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/_publish.yaml
    with:
      image-tags: |-
        snapshot
        snapshot-${{ needs.version.outputs.date }}
      image-version-label: snapshot-${{ needs.version.outputs.date }}
      chart-version: ${{ needs.version.outputs.chart-version }}
      chart-app-version: snapshot-${{ needs.version.outputs.date }}
