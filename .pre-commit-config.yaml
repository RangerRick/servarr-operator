repos:
  - repo: local
    hooks:
      # ── Stage 1: fast lint (mirrors CI stage 1) ───────────────────────────

      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all --check
        language: system
        pass_filenames: false
        stages: [pre-push]
        always_run: true

      - id: actionlint
        name: actionlint
        entry: actionlint
        language: system
        types: [yaml]
        files: ^\.github/workflows/
        stages: [pre-push]

      - id: zizmor
        name: zizmor
        entry: zizmor
        language: system
        pass_filenames: false
        files: ^\.github/workflows/
        stages: [pre-push]
        args: [.github/workflows/]

      - id: helm-lint
        name: helm lint
        entry: scripts/helm-lint.sh
        language: script
        pass_filenames: false
        files: ^charts/
        stages: [pre-push]

      # ── Stage 2: analysis (mirrors CI stage 2) ────────────────────────────

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --workspace --all-targets -- -D warnings
        language: system
        pass_filenames: false
        stages: [pre-push]
        always_run: true

      - id: cargo-test
        name: cargo test
        entry: cargo test --workspace
        language: system
        pass_filenames: false
        stages: [pre-push]
        always_run: true
